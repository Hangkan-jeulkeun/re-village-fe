apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: goormthon-6
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: re-village.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
