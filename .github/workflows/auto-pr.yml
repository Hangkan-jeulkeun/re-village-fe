name: Auto Create PR

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # Skip if PR already exists
          EXISTING=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH"
            exit 0
          fi

          # Generate title from branch name
          # feat/#12-login-page → feat: login page
          TYPE=$(echo "$BRANCH" | grep -oE '^(feat|fix|docs|style|refactor|test|chore)' || echo "")
          ISSUE_NUM=$(echo "$BRANCH" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' || echo "")
          DESCRIPTION=$(echo "$BRANCH" | sed 's|^[^/]*/||' | sed 's|#[0-9]*-\?||' | tr '-' ' ' | xargs)

          if [ -n "$TYPE" ]; then
            TITLE="$TYPE: $DESCRIPTION"
          else
            TITLE="$DESCRIPTION"
          fi

          # Generate body from commit messages since main
          BODY=$(git log origin/main..HEAD --pretty=format:"- %s" 2>/dev/null)
          if [ -z "$BODY" ]; then
            BODY="- $TITLE"
          fi

          # Add closing keyword if issue number found
          if [ -n "$ISSUE_NUM" ]; then
            CLOSE_LINE="Closes #$ISSUE_NUM"
          else
            CLOSE_LINE=""
          fi

          FULL_BODY=$(printf '## 변경 사항\n%s\n\n## 체크리스트\n- [ ] 코드 리뷰 완료\n- [ ] 테스트 통과\n\n%s' "$BODY" "$CLOSE_LINE")

          gh pr create \
            --title "$TITLE" \
            --body "$FULL_BODY" \
            --base main

          echo "✅ PR created: $TITLE"
