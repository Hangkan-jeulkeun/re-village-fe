name: Auto Merge PR

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: CI 실패 시 중단
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "❌ CI 실패 — 머지 중단"
          exit 1

      - name: Auto merge if no conflicts
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=$(gh pr list --head "$BRANCH" --repo ${{ github.repository }} --json number -q '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR 없음 — 종료"
            exit 0
          fi

          # mergeability 계산 대기 (최대 30초)
          for i in 1 2 3; do
            MERGEABLE=$(gh pr view $PR_NUMBER \
              --repo ${{ github.repository }} \
              --json mergeable \
              -q '.mergeable')
            echo "Mergeable: $MERGEABLE"
            [ "$MERGEABLE" != "UNKNOWN" ] && break
            echo "계산 중... 재시도 ($i/3)"
            sleep 10
          done

          if [ "$MERGEABLE" = "MERGEABLE" ]; then
            gh pr merge $PR_NUMBER \
              --squash \
              --delete-branch \
              --repo ${{ github.repository }}
            echo "✅ Auto-merged and deleted branch for PR #$PR_NUMBER"
          else
            gh pr comment $PR_NUMBER \
              --repo ${{ github.repository }} \
              --body "⚠️ **컨플릭트가 감지되었습니다.** main 브랜치와 충돌이 있어 자동 머지가 취소되었습니다. 로컬에서 충돌을 해결한 뒤 다시 push해주세요."
            echo "⚠️ PR #$PR_NUMBER has conflicts — 수동으로 해결 필요"
          fi
