name: Auto Merge PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Wait for mergeability check
        run: sleep 10

      - name: Auto merge if no conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          MERGEABLE=$(gh pr view $PR_NUMBER \
            --repo ${{ github.repository }} \
            --json mergeable \
            -q '.mergeable')

          echo "Mergeable: $MERGEABLE"

          if [ "$MERGEABLE" = "MERGEABLE" ]; then
            gh pr merge $PR_NUMBER \
              --squash \
              --delete-branch \
              --repo ${{ github.repository }}
            echo "✅ Auto-merged and deleted branch for PR #$PR_NUMBER"
          else
            gh pr comment $PR_NUMBER \
              --repo ${{ github.repository }} \
              --body "⚠️ **컨플릭트가 감지되었습니다.** main 브랜치와 충돌이 있어 자동 머지가 취소되었습니다. 로컬에서 충돌을 해결한 뒤 다시 push해주세요."
            echo "⚠️ PR #$PR_NUMBER has conflicts — 수동으로 해결 필요"
          fi
